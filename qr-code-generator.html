<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Worksheet Generator - Teacher Toolkit</title>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; color: #333; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; text-align: center; }
        .header h1 { margin-bottom: 10px; }
        .back-btn { position: absolute; top: 20px; left: 20px; background-color: rgba(255, 255, 255, 0.2); border: 1px solid white; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; }
        .page-actions { text-align: center; margin-top: 20px; margin-bottom: 20px; }
        .container { max-width: 980px; margin: 20px auto 40px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .tool-card { text-align: left; }
        textarea { width: 100%; min-height: 140px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; resize: vertical; }
        input, .btn { font-size: 1em; }
        .btn { background-color: #667eea; color: white; padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; margin-right: 10px; }
        .btn:hover { background-color: #5a67d8; }

        .worksheet { margin-top: 20px; }
        .worksheet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; }

        .qr-item {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.06);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .qr-item .item-title {
            display: block;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 14px;
            text-decoration: none;
            text-align: center;
        }

        .qr-item .item-title:hover { text-decoration: underline; }

        .qr-item .qrcode-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 200px;
            margin: 10px 0 0;
            padding: 12px;
            background: #fff;
            border-radius: 8px;
        }

        #print-help { margin-top: 12px; color: #555; font-size: .9em; }

        @media print {
            body { background: white; }
            .back-btn, .tool-card, .page-actions { display: none !important; }
            .container { box-shadow: none; margin: 0; border-radius: 0; }
            .worksheet-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .qr-item { page-break-inside: avoid; }
        }
    </style>
</head>

<body>

<a href="teaching-tools.html" class="back-btn">← Back to Teaching Tools</a>

<section class="header">
    <h1>QR Worksheet Generator</h1>
    <p>粘贴一组“Title - URL”，批量生成可打印的二维码工作表。</p>
</section>

<div class="container">
    <div class="tool-card">
        <label style="font-weight:bold;">批量链接输入（每行：Title - URL）</label>
        <textarea id="batch-input"></textarea>

        <div class="page-actions">
            <button class="btn" onclick="generateWorksheet()">Generate Worksheet</button>
            <button class="btn" onclick="exportToWord()">Export to Word</button>
        </div>

        <div id="print-help">
            ※ 生成后可导出 Word（含二维码 + 可点击链接）
        </div>
    </div>

    <div class="worksheet">
        <div class="worksheet-grid" id="worksheet-grid"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
function parseBatchText(value) {
    return value.split('\n')
        .map(line => line.trim())
        .filter(line => line)
        .map(line => {
            const parts = line.split('-');
            if (parts.length < 2) return null;
            const title = parts.slice(0, -1).join('-').trim();
            const url = parts[parts.length - 1].trim();
            return { title, url };
        })
        .filter(Boolean);
}

function clearWorksheet() {
    document.getElementById('worksheet-grid').innerHTML = '';
}

function generateWorksheet() {
    const text = document.getElementById('batch-input').value;
    const items = parseBatchText(text);

    if (!items.length) {
        alert('请输入至少一个有效 Title - URL');
        return;
    }

    clearWorksheet();

    const grid = document.getElementById('worksheet-grid');

    items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'qr-item';

        const titleLink = document.createElement('a');
        titleLink.className = 'item-title';
        titleLink.href = item.url;
        titleLink.target = '_blank';
        titleLink.innerText = item.title;

        const wrapper = document.createElement('div');
        const qr = document.createElement('div');

        wrapper.className = 'qrcode-wrapper';
        wrapper.appendChild(qr);

        card.appendChild(titleLink);
        card.appendChild(wrapper);
        grid.appendChild(card);

        new QRCode(qr, { text: item.url, width: 170, height: 170 });
    });

    document.getElementById('print-help').innerText =
        '生成完成 ✔ 可导出 Word（含二维码+链接）';
}

function exportToWord() {
    const grid = document.getElementById('worksheet-grid');
    if (!grid.innerHTML.trim()) {
        alert('请先生成二维码');
        return;
    }

    const items = Array.from(grid.querySelectorAll('.qr-item'));

    let rows = '';
    let row = [];

    items.forEach((item, i) => {
        const title = item.querySelector('.item-title').innerText;
        const url = item.querySelector('.item-title').href;
        const img = item.querySelector('canvas')?.toDataURL('image/png') || '';

        row.push(`
            <td style="width:25%;text-align:center;padding:10px;">
                <a href="${url}" style="font-weight:bold;display:block;margin-bottom:8px;">
                    ${title}
                </a>
                ${img ? `<img src="${img}" width="120"/>` : ''}
            </td>
        `);

        if (row.length === 4 || i === items.length - 1) {
            rows += `<tr>${row.join('')}</tr>`;
            row = [];
        }
    });

    const html = `
    <html>
    <head><meta charset="UTF-8"></head>
    <body>
        <table>${rows}</table>
    </body>
    </html>`;

    const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'qr-worksheet.doc';
    a.click();
}
</script>

</body>
</html>
